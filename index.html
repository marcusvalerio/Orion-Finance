<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Orion Finance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="noise"></div>

  <main class="app-shell">

    <header class="topbar glass">
      <div>
        <p class="eyebrow">Finance Experience</p>
        <h1>Orion</h1>
      </div>

      <div class="profile">
        <div class="profile-dot"></div>
        Marcus
      </div>
    </header>

    <section class="hero glass">
      <div>
        <p class="label">Saldo Total</p>
        <h2 id="balance">R$ 18.540,90</h2>

        <div class="hero-actions">
          <button class="primary">Adicionar</button>
          <button class="secondary">Transferir</button>
        </div>
      </div>

      <div class="hero-chart">
        <div class="line"></div>
      </div>
    </section>

    <section class="grid">
      <article class="card glass">
        <div class="card-header">
          <span>Receitas</span>
          <span class="positive">+12%</span>
        </div>

        <h3>R$ 9.200</h3>

        <div class="mini-bars">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </div>
      </article>

      <article class="card glass">
        <div class="card-header">
          <span>Despesas</span>
          <span class="negative">-4%</span>
        </div>

        <h3>R$ 3.420</h3>

        <div class="ring"></div>
      </article>
    </section>

    <section class="transactions glass">
      <div class="section-title">
        <h4>Atividade recente</h4>
        <button>Ver tudo</button>
      </div>

      <div class="transaction-list">

        <div class="transaction">
          <div class="icon soft"></div>
          <div>
            <strong>Apple Services</strong>
            <p>Assinatura</p>
          </div>
          <span>- R$ 49,90</span>
        </div>

        <div class="transaction">
          <div class="icon gradient"></div>
          <div>
            <strong>Guaracamp</strong>
            <p>Recebimento</p>
          </div>
          <span class="positive">+ R$ 2.500</span>
        </div>

        <div class="transaction">
          <div class="icon dark"></div>
          <div>
            <strong>Adobe</strong>
            <p>Creative Cloud</p>
          </div>
          <span>- R$ 99,00</span>
        </div>

      </div>
    </section>

    <nav class="dock glass">
      <button class="active">Home</button>
      <button>Cartões</button>
      <button>Insights</button>
      <button>Perfil</button>
    </nav>

  </main>

</body>
</html>
